name: Build and deploy staging

# Toggle staging on/off via the repository variable STAGING_ENABLED:
#   GitHub → Settings → Secrets and variables → Actions → Variables tab
#   Set STAGING_ENABLED = true  (full build)  or  false / absent  (placeholder page)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push to gh-pages
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── PLACEHOLDER (staging off) ────────────────────────────────────────────
      - name: Create placeholder site
        if: vars.STAGING_ENABLED != 'true'
        run: |
          mkdir -p _html_merged
          cat > _html_merged/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>RGI User Guide — Development Site</title>
            <style>
              body { font-family: sans-serif; max-width: 640px; margin: 5rem auto; padding: 1rem; color: #333; }
              a { color: #2D2D8C; }
            </style>
          </head>
          <body>
            <h1>RGI User Guide — Development Site</h1>
            <p>This is the RGI User Guide development URL and is not currently active.</p>
            <p>For the published version, visit
               <a href="https://rgidata.org/user_guide">rgidata.org/user_guide</a>.</p>
          </body>
          </html>
          HTMLEOF

      # ── FULL BUILD (staging on) ──────────────────────────────────────────────
      - name: Set up Python
        if: vars.STAGING_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: vars.STAGING_ENABLED == 'true'
        run: pip install "jupyter-book<2"

      - name: Inject staging banner
        if: vars.STAGING_ENABLED == 'true'
        run: |
          python - <<'EOF'
          import pathlib, re

          BANNER = (
              "&#9888;&#65039; This is a <strong>staging</strong> site. "
              "The published version is at "
              "<a href='https://rgidata.org/user_guide'>rgidata.org/user_guide</a>."
          )

          for config in ["v7.0/docs/_config.yml", "v7.1/docs/_config.yml"]:
              text = pathlib.Path(config).read_text()
              text = re.sub(
                  r"^(html:)",
                  f'\\1\n  announcement: "{BANNER}"',
                  text,
                  flags=re.MULTILINE,
              )
              pathlib.Path(config).write_text(text)
          EOF

      - name: Build all versions
        if: vars.STAGING_ENABLED == 'true'
        run: ./build.sh --all

      # ── DEPLOY (always) ─────────────────────────────────────────────────────
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_html_merged
          force_orphan: true
